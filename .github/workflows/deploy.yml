name: Deploy to Remote Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy and restart service via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          script: |
            set -e
            cd /home/url-shortener
            sudo /home/opt/stop.sh || true
            git pull origin master
            cd build
            cmake --build . -- -j$(nproc)
            sudo cp -rT /home/url-shortener/frontend /home/opt/frontend
            sudo cp bin/url_shortener /home/opt/
            sudo cp /home/url-shortener/start.sh /home/opt/
            sudo cp /home/url-shortener/stop.sh /home/opt/
            sudo chmod +x /home/opt/start.sh /home/opt/stop.sh
            sudo /home/opt/start.sh
