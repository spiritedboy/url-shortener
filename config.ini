; ===================================================
;  url-shortener 配置文件（INI 格式）
;  注释以分号 ; 开头
; ===================================================

[server]
; 管理接口端口（前端页面 + REST API）
admin_port = 8080
; 短链跳转端口（80 端口处理 GET 跳转）
redirect_port = 8000
; 工作线程数量（建议设置为 CPU 核数的 2 倍）
worker_threads = 4
; 前端静态文件所在目录（相对于可执行文件工作目录）
frontend_dir = ./frontend
; 短链跳转服务的对外访问地址（用于前端展示完整短链 URL）
; 格式：http(s)://域名或IP:端口（末尾不加斜杠）
redirect_base_url = http://127.0.0.1:8000

[shortener]
; 生成的短码长度（建议 6-8 位）
code_length = 6
; 是否忽略 URL 中 ? 后面的查询参数
; true  = 相同路径但不同查询参数视为同一 URL
; false = 完整 URL 参与哈希计算
ignore_query_string = false

[memory_cache]
; 内存 LRU 缓存最大存储条目数
max_size = 10000

[redis]
host = 127.0.0.1
port = 6379
; Redis 认证密码（留空则不认证）
password =
; Redis 连接池大小
pool_size = 8
; 缓存条目 TTL（秒），0 表示不过期
ttl = 3600

[mysql]
host = 127.0.0.1
port = 3306
user = root
; MySQL 认证密码
password =
; 数据库名（不存在则自动创建）
database = url_shortener
; MySQL 连接池大小
pool_size = 8

[log]
; 日志文件路径
file = ./url-shortener.log
; 日志级别: debug / info / warn / error
level = info
